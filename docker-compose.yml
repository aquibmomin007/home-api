version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: home_app_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-homeuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homepass}
      POSTGRES_DB: ${POSTGRES_DB:-home_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-homeuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
